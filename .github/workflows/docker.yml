name: Build and Push Docker Images

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_BASE: ghcr.io/${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push watcher image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: watcher
          push: ${{ github.event_name == 'push' }}
          tags: |
            ${{ env.IMAGE_BASE }}/watcher:latest
            ${{ env.IMAGE_BASE }}/watcher:sha-${{ github.sha }}
          cache-from: type=gha,scope=watcher
          cache-to: type=gha,scope=watcher,mode=max

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: web
          push: ${{ github.event_name == 'push' }}
          tags: |
            ${{ env.IMAGE_BASE }}/web:latest
            ${{ env.IMAGE_BASE }}/web:sha-${{ github.sha }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,scope=web,mode=max
